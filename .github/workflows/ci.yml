name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - production
          - development
        default: development

env:
  IMAGE_NAME: titlehub-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.environment == 'production' && 'prod.latest' || 'dev.latest' }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:v${{ steps.pkg.outputs.version }}
          build-args: |
            VITE_CONVEX_URL=${{ vars.VITE_CONVEX_URL }}
            VITE_CONVEX_SITE_URL=${{ vars.VITE_CONVEX_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install dependencies for Convex deploy
        if: github.event.inputs.environment == 'production'
        uses: oven-sh/setup-bun@v2

      - name: Debug secrets
        if: github.event.inputs.environment == 'production'
        run: |
          echo "URL length: ${#CONVEX_SELF_HOSTED_URL}"
          echo "KEY length: ${#CONVEX_SELF_HOSTED_ADMIN_KEY}"
          echo "URL last 4: ${CONVEX_SELF_HOSTED_URL: -4}"
          echo "KEY last 4: ${CONVEX_SELF_HOSTED_ADMIN_KEY: -4}"
        env:
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}

      - name: Deploy Convex functions
        if: github.event.inputs.environment == 'production'
        run: |
          bun install --frozen-lockfile
          bunx convex deploy
        env:
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}

      - name: Deploy to Coolify
        run: |
          curl --request GET '${{ vars.COOLIFY_WEBHOOK }}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'
